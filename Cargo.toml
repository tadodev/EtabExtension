# Root Cargo.toml (workspace configuration)
[workspace]
members = [
    "src-tauri",
    "e2k-parser"
]

resolver = "2"


[workspace.dependencies]
# Shared dependencies across workspace members
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
anyhow = "1.0"
thiserror = "2.0.17"

# E2K Parser specific
nom = "7.1"  # For parsing
encoding_rs = "0.8"  # For Windows-1251 encoding
regex = "1.10"

# Database
rusqlite = { version = "0.32", features = ["bundled"] }
tokio = { version = "1", features = ["full"] }


[profile.release]
# Optimize for size (important for desktop apps)
opt-level = "z"
lto = true
codegen-units = 1
strip = true